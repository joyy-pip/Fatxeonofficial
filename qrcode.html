<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>126.538.029</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <style>
        /* --- CORE CONFIG THEME --- */
        :root {
            --bg-main: #060609;
            --bg-card: #0c0c14;
            --bg-sidebar: #09090e;
            --border-color: rgba(255, 255, 255, 0.06);
            --race-red: #ff2a4b;
            --race-yellow: #ffb700;
            --text-neon: #00ffaa; 
            --text-muted: #78788a;
            --transition-speed: 0.25s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background-color: var(--bg-main); color: #d8d8e0; padding-top: 95px; overflow-x: hidden; }
        
        /* --- NAVBAR & SIDEBAR --- */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: #060609; border-bottom: 2px solid var(--race-red); 
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px; z-index: 1000;
        }
        .navbar-brand { color: var(--race-yellow); font-size: 1.25rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .sys-status { font-size: 0.75rem; font-weight: bold; color: var(--text-neon); display: flex; align-items: center; gap: 6px; margin-right: 20px;}
        .sys-status::before { content: ''; width: 7px; height: 7px; background: var(--text-neon); border-radius: 50%; box-shadow: 0 0 8px var(--text-neon); }
        .hamburger { width: 24px; height: 16px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 1001; }
        .hamburger span { display: block; height: 2px; width: 100%; background-color: var(--race-yellow); transition: all var(--transition-speed); }
        .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); background-color: var(--race-red); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background-color: var(--race-red); }

        .sidebar {
            position: fixed; top: 0; left: -320px; width: 320px; height: 100%; background: var(--bg-sidebar); border-right: 2px solid var(--race-red);
            padding: 110px 25px 25px 25px; transition: left var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1); z-index: 999;
        }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 12px; }
        .sidebar-menu a { 
            color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: bold;
            display: block; padding: 14px 18px; border-radius: 4px; border: 1px solid transparent;
        }
        .sidebar-menu a:hover, .sidebar-menu a.active { color: #fff; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 183, 0, 0.25); border-left: 4px solid var(--race-yellow); }

        /* --- CONTENT WRAPPER --- */
        .wrapper { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px 20px; }
        header { background: rgba(12, 12, 20, 0.6); border: 1px solid var(--race-yellow); padding: 20px 25px; border-radius: 6px; margin-bottom: 30px; }
        header h1 { color: var(--race-yellow); font-size: 1.35rem; font-weight: bold; text-transform: uppercase;}
        header p { color: var(--text-muted); font-size: 0.75rem; }

        .glass-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 25px; margin-bottom: 20px; }
        .input-group { position: relative; margin-bottom: 20px; display: flex; align-items: center; }
        .input-box { width: 100%; padding: 14px 14px 14px 45px; background: #060609; border: 1px solid var(--border-color); color: #fff; font-size: 0.85rem; font-family: monospace; border-radius: 4px; }
        .input-box:focus { outline: none; border-color: var(--race-yellow); }
        .input-icon { position: absolute; left: 16px; color: var(--text-muted); font-size: 0.95rem; }
        
        .action-btn { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--race-yellow); color: var(--race-yellow); font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; border-radius: 4px; }
        .action-btn:hover { background: rgba(255, 183, 0, 0.05); }

        .toast { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #0c0c14; border: 1px solid var(--race-yellow); padding: 12px 24px; color: #fff; z-index: 2000; transition: opacity 0.3s, visibility 0.3s; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; border-radius: 4px; visibility: hidden; opacity: 0; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">Server Telnet Fatxeon</div>
            <div class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <aside class="sidebar" id="sidebarMenu">
        <ul class="sidebar-menu">
             <li><a href="index.html">// DASHBOARD</a></li>
            <li><a href="tiktok.html">// TIKTOK_DOWNLOADER</a></li>
            <li><a href="youtube.html">// YOUTUBE_DOWNLOADER</a></li>
            <li><a href="qrcode.html" class="active">// QR_GENERATOR</a></li>
            <li><a href="ip.html">// IP TRACKER</a></li>
            <li><a href="auth1.html">// LACAK NOMOR</a></li>
            <li><a href="auth2.html">// HACK GMAIL</a></li>
            <li><a href="auth3.html">// HACK FACEBOOK</a></li>
            <li><a href="auth4.html">// TELNET SERVER</a></li>
        </ul>
    </aside>

    <div class="wrapper">
        <header>
            <h1>Cyber QR Code Generator</h1>
            <p>[Modul enkripsi matriks dua dimensi]</p>
        </header>

        <section class="view-section">
            <div class="glass-card">
                <div class="input-group">
                    <i class="fa-solid fa-qrcode input-icon"></i>
                    <input type="text" class="input-box" id="qr-text" placeholder="Masukkan teks atau URL untuk matriks QR...">
                </div>
                <button class="action-btn" onclick="generateMyQRCode()">GENERATE QR CODE</button>
            </div>
            <div class="glass-card" id="qr-result-section" style="display: none; text-align: center; background: #fff; padding: 20px; max-width: 240px; margin: 0 auto; border-radius: 6px;"><canvas id="qrcode-canvas" style="max-width: 100%;"></canvas></div>
        </section>
    </div>

    <div class="toast" id="toast"><i class="fa-solid fa-info-circle"></i><span id="toast-msg">Notification</span></div>

    <script>
        function toggleSidebar() {
            document.getElementById('hamburgerBtn').classList.toggle('active');
            document.getElementById('sidebarMenu').classList.toggle('active');
        }

        function generateMyQRCode() {
            const qrText = document.getElementById('qr-text').value.trim(); const canvas = document.getElementById('qrcode-canvas');
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');

            const triggerToast = (msg) => {
                toastMsg.innerText = msg; toast.style.visibility = 'visible'; toast.style.opacity = '1';
                setTimeout(() => { toast.style.visibility = 'hidden'; toast.style.opacity = '0'; }, 3000);
            };

            if (!qrText) return triggerToast("Masukkan text atau URL!");
            if (typeof QRCode !== 'undefined') {
                QRCode.toCanvas(canvas, qrText, { width: 200, margin: 1 }, function (err) {
                    if (err) triggerToast("Generasi Gagal!"); else { document.getElementById('qr-result-section').style.display = 'block'; triggerToast("Matrix QR Created!"); }
                });
            }
        }
    </script>
</body>
</html>
